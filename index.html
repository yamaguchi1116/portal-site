<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Media Portal</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
padding:8px 16px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

iframe{
margin:10px;
border-radius:10px;
}

#admin,#home{
display:none;
}

a{
color:#60a5fa;
}

</style>

</head>

<body>

<header>Media Portal</header>

<div class="container">

<div id="login" class="card">

<h2>ログイン</h2>

<input id="id" placeholder="ユーザーID"><br>
<input id="pass" type="password" placeholder="パスワード"><br>

<button onclick="login()">ログイン</button>

<p id="msg"></p>

</div>

<div id="admin">

<div class="card">

<h2>ユーザー作成</h2>

<input id="newUser" placeholder="ユーザーID">
<input id="newPass" placeholder="パスワード">

<button onclick="createUser()">作成</button>

</div>

<div class="card">

<h2>ユーザー一覧</h2>

<div id="userList"></div>

</div>

<div class="card">

<h2>YouTube追加</h2>

<input id="youtube" placeholder="YouTube URL">
<button onclick="addVideo()">追加</button>

</div>

<div class="card">

<h2>ダウンロード追加</h2>

<input id="file" placeholder="ファイルURL">
<button onclick="addFile()">追加</button>

</div>

<button onclick="logout()">ログアウト</button>

</div>

<div id="home">

<div class="card">

<h2>動画</h2>

<div id="videos"></div>

</div>

<div class="card">

<h2>ダウンロード</h2>

<div id="files"></div>

</div>

<button onclick="logout()">ログアウト</button>

</div>

</div>

<script>

let users=JSON.parse(localStorage.getItem("users")) || [
{id:"yamaguchi20131116",pass:"Yi1116",role:"admin"},
{id:"yamaguchi1116",pass:"Yi1116",role:"user"}
]

let videos=JSON.parse(localStorage.getItem("videos")) || []
let files=JSON.parse(localStorage.getItem("files")) || []

function saveData(){

localStorage.setItem("users",JSON.stringify(users))
localStorage.setItem("videos",JSON.stringify(videos))
localStorage.setItem("files",JSON.stringify(files))

}

function hideAll(){

login.style.display="none"
admin.style.display="none"
home.style.display="none"

}

let role=sessionStorage.getItem("role")

hideAll()

if(role==="admin"){
showAdmin()
}
else if(role==="user"){
showHome()
}
else{
login.style.display="block"
}

function showAdmin(){

hideAll()
admin.style.display="block"

loadUsers()
loadContent()

}

function showHome(){

hideAll()
home.style.display="block"

loadContent()

}

function login(){

let id=document.getElementById("id").value
let pass=document.getElementById("pass").value

for(let u of users){

if(u.id===id && u.pass===pass){

sessionStorage.setItem("role",u.role)
location.reload()
return

}

}

msg.innerText="ログイン情報が違います"

}

function logout(){

sessionStorage.clear()
location.reload()

}

function createUser(){

let id=newUser.value
let pass=newPass.value

if(!id || !pass)return

users.push({id,pass,role:"user"})

saveData()
loadUsers()

newUser.value=""
newPass.value=""

}

function loadUsers(){

userList.innerHTML=""

for(let u of users){

userList.innerHTML+=`
<div>
${u.id} (${u.role})
</div>
`

}

}

function addVideo(){

let url=youtube.value

if(!url)return

videos.push(url)

saveData()
youtube.value=""

loadContent()

}

function addFile(){

let url=file.value

if(!url)return

files.push(url)

saveData()
file.value=""

loadContent()

}

function getYoutubeId(url){

let reg=/v=([^&]+)/

let match=url.match(reg)

return match?match[1]:url

}

function loadContent(){

videosDiv=document.getElementById("videos")
filesDiv=document.getElementById("files")

videosDiv.innerHTML=""
filesDiv.innerHTML=""

for(let v of videos){

let id=getYoutubeId(v)

videosDiv.innerHTML+=`
<iframe width="300" height="170"
src="https://www.youtube.com/embed/${id}"
frameborder="0" allowfullscreen>
</iframe>
`

}

for(let f of files){

filesDiv.innerHTML+=`
<div>
<a href="${f}" download>ダウンロード</a>
</div>
`

}

}

</script>

</body>
</html>
